name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit

  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release directory
        run: mkdir -p languagerelease

      - name: Copy plugin files (only runtime-relevant files)
        run: |
          cp -r classes languagerelease/
          cp -r dialogs languagerelease/
          cp -r languages languagerelease/
          cp index.php languagerelease/
          cp index.js languagerelease/
          cp helpers.php languagerelease/
          cp composer.json languagerelease/
          cp README.md languagerelease/
          cp CHANGELOG.md languagerelease/
          cp LICENSE languagerelease/

      - name: Create ZIP archive
        run: |
          zip -r kirby-languagerelease-${{ steps.get_version.outputs.VERSION }}.zip languagerelease

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}

          # Extract the section for this version from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > release_notes.md
          fi

          # Fallback if no notes found
          if [ ! -s release_notes.md ]; then
            echo "Release ${VERSION}" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kirby-languagerelease-${{ steps.get_version.outputs.VERSION }}.zip
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
